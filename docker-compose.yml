services:
  backend:
    build: ./backend
    container_name: barbearia_backend
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file: ./backend/.env
    depends_on:
      - db

  static_files:
    image: nginx:1.27-alpine
    container_name: barbearia_static
    restart: on-failure
    ports:
      - "8081:80"
    volumes:
      - ./backend/static/previews:/usr/share/nginx/html/previews:ro
      - ./backend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  db:
    image: mysql:8.0
    container_name: barbearia_mysql
    restart: on-failure
    ports:
      - "3306:3306"
    env_file: ./backend/.env
    volumes:
      - barbearia_mysql_data:/var/lib/mysql

volumes:
  barbearia_mysql_data: