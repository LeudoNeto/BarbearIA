server {
    listen 80;
    server_name _;

    location /previews/ {
        alias /usr/share/nginx/html/previews/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location = / {
        default_type text/plain;
        return 200 "BarbearIA static files\n";
    }
}
